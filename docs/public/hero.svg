<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <!-- Outer glass ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.12"/>
  <circle cx="100" cy="100" r="85" fill="url(#g2)"/>
  <!-- Chart bars -->
  <rect x="25" y="130" width="32" height="50" rx="4" fill="url(#g)" opacity="0.55"/>
  <rect x="72" y="95" width="32" height="85" rx="4" fill="url(#g)" opacity="0.75"/>
  <rect x="119" y="60" width="32" height="120" rx="4" fill="url(#g)" opacity="0.9"/>
  <!-- Trend line -->
  <polyline points="41,115 88,80 135,50" fill="none" stroke="#67e8f9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <circle cx="135" cy="50" r="5" fill="#22d3ee"/>
  <!-- Grid dots -->
  <circle cx="20" cy="20" r="1.5" fill="rgba(255,255,255,0.06)"/>
  <circle cx="180" cy="20" r="1.5" fill="rgba(255,255,255,0.06)"/>
  <circle cx="20" cy="180" r="1.5" fill="rgba(255,255,255,0.06)"/>
  <circle cx="180" cy="180" r="1.5" fill="rgba(255,255,255,0.06)"/>
</svg>
