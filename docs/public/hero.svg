<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="url(#bg)"/>

  <!-- Chart bars (quant) -->
  <rect x="100" y="250" width="30" height="80" rx="4" fill="url(#grad1)" opacity="0.7"/>
  <rect x="140" y="200" width="30" height="130" rx="4" fill="url(#grad1)" opacity="0.85"/>
  <rect x="180" y="160" width="30" height="170" rx="4" fill="url(#grad1)" opacity="0.95"/>

  <!-- Chart line -->
  <polyline points="105,250 135,210 165,190 195,160 225,170 255,140 285,155"
            fill="none" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Nodes (AI network) -->
  <circle cx="255" cy="140" r="6" fill="#0ea5e9" filter="url(#glow)"/>
  <circle cx="285" cy="155" r="5" fill="#38bdf8" filter="url(#glow)"/>
  <circle cx="225" cy="170" r="4" fill="#7dd3fc" filter="url(#glow)"/>

  <!-- Decorative dots -->
  <circle cx="130" cy="120" r="3" fill="#0ea5e9" opacity="0.4"/>
  <circle cx="280" cy="230" r="3" fill="#38bdf8" opacity="0.3"/>
  <circle cx="310" cy="180" r="2" fill="#7dd3fc" opacity="0.3"/>
  <circle cx="90" cy="180" r="2" fill="#0ea5e9" opacity="0.2"/>
</svg>
